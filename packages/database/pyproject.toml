[project]
name = "database"
version = "0.1.0"
description = "SQLAlchemy models and repositories for user, config, HF metadata and task queue"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "asyncpg<0.31.0",
    "sqlalchemy>=2.0.47",
    "cryptography>=42.0.0",
    "loguru>=0.7.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/database"]
