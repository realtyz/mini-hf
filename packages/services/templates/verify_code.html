<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mini-hf 邮箱验证码</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #f6f9fc;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        line-height: 1.6;
        color: #374151;
      }
      .wrapper {
        padding: 40px 20px;
      }
      .card {
        max-width: 560px;
        margin: 0 auto;
        background-color: #ffffff;
        border-radius: 16px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
        overflow: hidden;
      }
      .brand {
        text-align: center;
        padding: 28px 24px 12px;
      }
      .brand-logo {
        font-size: 22px;
        font-weight: 700;
        color: #111827;
        letter-spacing: -0.5px;
      }
      .header {
        background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
        color: #ffffff;
        padding: 32px 24px;
        text-align: center;
      }
      .header-icon {
        font-size: 40px;
        margin-bottom: 8px;
      }
      .header-title {
        margin: 0;
        font-size: 22px;
        font-weight: 600;
      }
      .content {
        padding: 32px;
      }
      .content p {
        margin: 0 0 16px;
        font-size: 15px;
        color: #4b5563;
      }
      .code-box {
        background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
        border: 1px solid #bfdbfe;
        border-radius: 12px;
        padding: 28px;
        text-align: center;
        margin: 24px 0;
      }
      .code-text {
        font-size: 38px;
        font-weight: 700;
        letter-spacing: 10px;
        color: #1d4ed8;
        font-family: "SF Mono", Monaco, monospace;
      }
      .hint {
        font-size: 14px;
        color: #6b7280;
      }
      .hint strong {
        color: #374151;
      }
      .footer {
        text-align: center;
        padding: 24px;
        color: #9ca3af;
        font-size: 12px;
        border-top: 1px solid #f3f4f6;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="card">
        <div class="brand">
          <div class="brand-logo">Mini-HF</div>
        </div>
        <div class="header">
          <div class="header-icon">🔐</div>
          <h1 class="header-title">邮箱验证码</h1>
        </div>
        <div class="content">
          <p>您好！您正在进行邮箱验证，验证码如下：</p>
          <div class="code-box">
            <span class="code-text">{{ code }}</span>
          </div>
          <p class="hint">
            验证码有效期为 <strong>5 分钟</strong>，请尽快使用。
          </p>
          <p class="hint">如果您没有请求此验证码，请忽略此邮件。</p>
        </div>
        <div class="footer">© {{ year }} Mini-HF. 保留所有权利。</div>
      </div>
    </div>
  </body>
</html>
