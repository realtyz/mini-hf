[project]
name = "services"
version = "0.1.0"
description = "Shared services for mini-hf including email"
readme = "README.md"
authors = [{ name = "realtyz", email = "realtyz@outlook.com" }]
requires-python = ">=3.12"
dependencies = [
    "aiosmtplib>=3.0.0",
    "jinja2>=3.0.0",
    "loguru>=0.7.0",
    "database",
    "cache",
    "huggingface-hub>=1.9.0",
]

[tool.uv.sources]
database = { workspace = true }
cache = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/services"]
force-include = { "templates" = "services/templates" }
