[project]
name = "storage"
version = "0.1.0"
description = "Storage utilities for model and dataset cache management"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "boto3==1.20.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/storage"]
